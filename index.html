<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Skills Atlas · AI Coding Skills 检索页</title>
  <meta name="description" content="可检索的 AI 编码技能目录，汇集 tw93 与 Matt Pocock 的公开技能库。">
  <link rel="stylesheet" href="./assets/styles.css">
</head>
<body>
  <a class="skip-link" href="#main-content">跳到主要内容</a>

  <header class="site-header">
    <div class="site-header__inner">
      <p class="byline">TW93 × MATT POCOCK</p>
      <h1 class="site-title">Skills Atlas</h1>
      <p class="site-intro">
        汇编 tw93 与 Matt Pocock 公开技能库的可检索目录，帮助你在编码任务中快速找到合适的技能、用法与适用场景。
      </p>
      <nav class="source-links" aria-label="上游来源仓库">
        <a href="https://github.com/tw93/Waza" target="_blank" rel="noopener noreferrer">tw93/Waza</a>
        <a href="https://github.com/tw93/Kami" target="_blank" rel="noopener noreferrer">tw93/Kami</a>
        <a href="https://github.com/mattpocock/skills" target="_blank" rel="noopener noreferrer">mattpocock/skills</a>
      </nav>
    </div>
  </header>

  <main class="page" id="main-content">
    <section class="search-section" aria-labelledby="search-heading">
      <h2 id="search-heading" class="section-heading">找一个适合当前任务的技能</h2>
      <div class="search" role="search">
        <label for="skill-search" class="search-label">搜索技能名称、作者、描述或使用场景</label>
        <input
          type="search"
          id="skill-search"
          name="skill-search"
          class="search-input"
          placeholder="例如：调试、UI、TDD、PDF、deprecated"
          autocomplete="off"
          inputmode="search"
          aria-describedby="result-count">
      </div>
      <p id="result-count" class="result-count" role="status" aria-live="polite">正在加载技能数据…</p>
    </section>

    <section class="results-section" aria-labelledby="results-heading">
      <div class="results-section__head">
        <h2 id="results-heading" class="section-heading">技能目录</h2>
        <p class="results-hint">点击卡片中的按钮，在站内查看完整说明。</p>
      </div>

      <div id="skills-results" class="results-list"></div>

      <div id="empty-state" class="state-message empty-state" hidden>
        <p>没有找到匹配的技能，试试更换关键词，或清空搜索查看全部。</p>
        <button type="button" id="clear-search" class="clear-button">清空搜索</button>
      </div>

      <p id="error-state" class="state-message error-message" role="alert" hidden>技能数据加载失败，请刷新页面后重试。</p>
    </section>
  </main>

  <footer class="site-footer">
    <p>整理日期：2026-07-14。内容根据上游仓库更新可能需要人工维护。</p>
  </footer>

  <script type="module" src="./assets/app.js"></script>
</body>
</html>
